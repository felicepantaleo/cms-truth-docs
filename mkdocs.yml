site_name: CMS MC-Truth Graph
site_description: A single, navigable, physics-oriented truth graph for CMS (PhysicsTools/TruthInfo)
site_author: Felice Pantaleo (CERN)

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - Home: index.md
  - Data model: data-model.md
  - How to use the graph: usage.md
  - Interface reference: interface.md
  - Worked examples: examples.md
  - Findings & changes: findings.md
  - Replacing truth objects: replacing-truth-objects.md
  - Validation: validation.md
  - Pileup: pileup.md
  - Implementation characteristics: optimization.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji

plugins:
  # `search` is implicit until a plugins section exists, then it must be listed.
  - search
  # Click any image to open it in a full-screen lightbox; the gallery graphs are
  # large vector SVGs, so enable mouse-wheel zoom and drag-to-pan to read them at
  # full size without downloading. Opt images out per-image with {.off-glb}.
  - glightbox:
      zoomable: true
      draggable: true
      touchNavigation: true
      effect: zoom
      width: 100%
      height: auto
      background: white
